name: photonlink_app
description: PhotonLink — offline peer-to-peer optical file transfer.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.7
  shared_preferences: ^2.3.2
  camera: ^0.11.0+2
  file_picker: ^8.1.2
  permission_handler: ^11.3.1
  package_info_plus: ^8.0.2
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  logger: ^2.4.0
  intl: ^0.19.0
  qr_flutter: ^4.1.0
  mobile_scanner: ^7.2.0
  crypto: ^3.0.7
  cryptography: ^2.7.0
  image: ^4.5.4
  path_provider: ^2.1.5
  device_info_plus: ^11.3.0
  flutter_rust_bridge: ^2.11.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
